<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login & Signup UI</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #2c2f38;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes slideDown {
      0% { transform: translateY(-100vh); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .container {
      width: 320px;
      background: linear-gradient(145deg, #353a45, #2b2f38);
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      transition: all 0.5s ease;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: slideDown 1.2s ease-out forwards;
    }

    .form {
      padding: 30px;
      display: none;
      flex-direction: column;
      color: #fff;
      width: 100%;
      box-sizing: border-box;
    }

    .form.active { display: flex; }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #00c9a7;
    }

    input {
      margin: 8px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      background-color: #404552;
      color: #fff;
      font-size: 14px;
    }

    input::placeholder { color: #aaa; }

    .btn {
      margin-top: 20px;
      background-color: #00c9a7;
      border: none;
      color: white;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .btn:hover { background-color: #00b194; }

    .toggle {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
    }

    .toggle a {
      color: #00c9a7;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    .toggle a:hover { text-decoration: underline; }

    .message {
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
      padding: 8px;
      border-radius: 6px;
    }

    .message.success { color: #0f5132; background-color: #d1e7dd; }
    .message.error { color: #842029; background-color: #f8d7da; }

    .refresh-container { text-align: center; width: 100%; }
    .refresh-btn {
      margin-top: 10px;
      background-color: #00c9a7;
      border: none;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .refresh-btn:hover { background-color: #00b194; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Form -->
    <div class="form active" id="loginForm">
      <h2>Login</h2>
      <input type="text" id="loginUsername" placeholder="Username or Email" />
      <input type="password" id="loginPassword" placeholder="Password" />
      <div class="message" id="loginMessage"></div>
      <button class="btn" onclick="login()">Log In</button>
      <div class="toggle">
        Don’t have an account? <a onclick="toggleForm()">Create one</a>
      </div>
    </div>

    <!-- Signup Form -->
    <div class="form" id="signupForm">
      <h2>Create Account</h2>
      <input type="text" id="signupUsername" placeholder="Username" />
      <input type="email" id="signupEmail" placeholder="Email" />
      <input type="password" id="signupPassword" placeholder="Password" />
      <div class="message" id="signupMessage"></div>
      <button class="btn" onclick="signup()">Sign Up</button>
      <div class="toggle">
        Already have an account? <a onclick="toggleForm()">Log in</a>
      </div>
    </div>

    <!-- Refresh Button -->
    <div class="refresh-container">
      <button class="refresh-btn" onclick="refreshPage()">🔄 Refresh Page</button>
    </div>
  </div>

  <script>
    function toggleForm() {
      document.getElementById("loginForm").classList.toggle("active");
      document.getElementById("signupForm").classList.toggle("active");
      clearMessages();
    }

    function clearMessages() {
      document.getElementById("signupMessage").style.display = "none";
      document.getElementById("loginMessage").style.display = "none";
    }

    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }

    function validatePassword(password) {
      return password.length >= 6;
    }

    function signup() {
      const username = document.getElementById("signupUsername").value.trim();
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value;
      const messageDiv = document.getElementById("signupMessage");

      messageDiv.style.display = "block";

      if (!username || !email || !password) {
        messageDiv.innerText = "All fields are required!";
        messageDiv.className = "message error";
        return;
      }

      if (!validateEmail(email)) {
        messageDiv.innerText = "Invalid email format!";
        messageDiv.className = "message error";
        return;
      }

      if (!validatePassword(password)) {
        messageDiv.innerText = "Password must be at least 6 characters!";
        messageDiv.className = "message error";
        return;
      }

      // Save signup data in localStorage
      let users = JSON.parse(localStorage.getItem("users")) || [];
      const userExists = users.some(u => u.username === username || u.email === email);
      if (userExists) {
        messageDiv.innerText = "User already exists!";
        messageDiv.className = "message error";
        return;
      }

      users.push({ username, email, password });
      localStorage.setItem("users", JSON.stringify(users));

      messageDiv.innerText = "Account created successfully!";
      messageDiv.className = "message success";

      setTimeout(() => { toggleForm(); }, 1000);
    }

    function login() {
      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value;
      const messageDiv = document.getElementById("loginMessage");

      messageDiv.style.display = "block";

      if (!username || !password) {
        messageDiv.innerText = "Please enter valid credentials!";
        messageDiv.className = "message error";
        return;
      }

      const users = JSON.parse(localStorage.getItem("users")) || [];
      const validUser = users.find(u => (u.username === username || u.email === username) && u.password === password);

      if (validUser) {
        messageDiv.innerText = `Logged in successfully as ${validUser.username}`;
        messageDiv.className = "message success";
        setTimeout(() => {
          window.location.href = "radha_dashboard.html"; // redirect page
        }, 1000);
      } else {
        messageDiv.innerText = "Invalid username or password!";
        messageDiv.className = "message error";
      }
    }

    function refreshPage() {
      location.reload();
    }
  </script>
</body>
</html>
